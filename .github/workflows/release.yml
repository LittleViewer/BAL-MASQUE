name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: BalMasque_Windows
            ext: .exe
          - os: ubuntu-22.04
            name: Linux
            artifact: BalMasque_Linux
            ext: ""
          - os: macos-15-intel
            name: Mac_Intel
            artifact: BalMasque_Mac_Intel
            ext: ""
          - os: macos-14
            name: Mac_AppleSilicon
            artifact: BalMasque_Mac_AppleSilicon
            ext: ""

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            SEP=";"
          else
            SEP=":"
          fi
          pyinstaller --onefile --windowed --name "BalMasque" --add-data "logo.png${SEP}." --icon logo.png bal_masque.py
        shell: bash

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir release
          cp dist/BalMasque.exe release/BalMasque.exe
          cp README.md release/
          cp LICENSE release/
          cd release && 7z a -tzip ../${{ matrix.artifact }}.zip *
        shell: bash

      - name: Prepare artifact (Linux/Mac)
        if: runner.os != 'Windows'
        run: |
          mkdir release
          if [ -d "dist/BalMasque.app" ]; then
            cp -r dist/BalMasque.app release/
          else
            cp dist/BalMasque release/BalMasque
            chmod +x release/BalMasque
          fi
          cp README.md release/
          cp LICENSE release/
          cd release && tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.tar.gz
          if-no-files-found: ignore

  build-android:
    runs-on: ubuntu-latest
    name: Build Android APK

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            automake \
            lld

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Prepare Haar cascades for Android
        run: |
          mkdir -p cascades
          HAAR_DIR=$(python -c "import cv2; print(cv2.data.haarcascades)" 2>/dev/null || echo "")
          if [ -z "$HAAR_DIR" ]; then
            pip install opencv-python-headless
            HAAR_DIR=$(python -c "import cv2; print(cv2.data.haarcascades)")
          fi
          cp "${HAAR_DIR}haarcascade_frontalface_default.xml" cascades/
          cp "${HAAR_DIR}haarcascade_frontalface_alt2.xml" cascades/
          cp "${HAAR_DIR}haarcascade_profileface.xml" cascades/

      - name: Build APK with Buildozer
        run: |
          buildozer android debug
        timeout-minutes: 60

      - name: Prepare Android artifact
        run: |
          mkdir -p release-android
          cp bin/*.apk release-android/BalMasque.apk
          cp README.md release-android/
          cp LICENSE release-android/
          cd release-android && zip ../BalMasque_Android.zip *

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: BalMasque_Android
          path: BalMasque_Android.zip

  release:
    needs: [build, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Bal Masqué ${{ github.ref_name }}"
          body: |
            ## 🎭 Bal Masqué ${{ github.ref_name }}

            ### Téléchargements

            | Plateforme | Fichier |
            |---|---|
            | 🪟 Windows | `BalMasque_Windows.zip` |
            | 🐧 Linux (Ubuntu/Mint) | `BalMasque_Linux.tar.gz` |
            | 🍎 macOS (Intel) | `BalMasque_Mac_Intel.tar.gz` |
            | 🍎 macOS (Apple Silicon) | `BalMasque_Mac_AppleSilicon.tar.gz` |
            | 🤖 Android (APK) | `BalMasque_Android.zip` |

            ### Installation

            **Windows** : Extraire le zip et lancer `BalMasque.exe`

            **Linux** :
            ```bash
            tar xzf BalMasque_Linux.tar.gz
            chmod +x BalMasque
            ./BalMasque
            ```

            **macOS** :
            ```bash
            tar xzf BalMasque_Mac_Intel.tar.gz
            open BalMasque.app
            ```

            **Android** :
            1. Extraire `BalMasque_Android.zip`
            2. Installer `BalMasque.apk` (activer "Sources inconnues" dans les paramètres)
            3. L'application apparaît dans le menu "Partager avec" pour les images

            ### Depuis les sources
            ```bash
            pip install -r requirements.txt
            python bal_masque.py
            ```
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          draft: false
          prerelease: false
