name: Release Desktop v2.1

on:
  push:
    tags:
      - 'v2.1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dependances
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable Linux
        run: |
          pyinstaller --onefile --windowed \
            --name "BalMasque-Linux" \
            --add-data "logo.png:." \
            --collect-data cv2 \
            bal_masque.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BalMasque-Linux
          path: dist/BalMasque-Linux

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dependances
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable Windows
        run: |
          pyinstaller --onefile --windowed `
            --name "BalMasque" `
            --add-data "logo.png;." `
            --collect-data cv2 `
            bal_masque.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BalMasque-Windows
          path: dist/BalMasque.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dependances
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable macOS
        run: |
          pyinstaller --onefile --windowed \
            --name "BalMasque-macOS" \
            --add-data "logo.png:." \
            --collect-data cv2 \
            bal_masque.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BalMasque-macOS
          path: dist/BalMasque-macOS

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Telecharger tous les artifacts
        uses: actions/download-artifact@v4.1.7
        with:
          path: release-assets

      - name: Preparer les fichiers
        run: |
          mkdir -p final
          cp release-assets/BalMasque-Linux/BalMasque-Linux   final/BalMasque-Linux
          cp release-assets/BalMasque-Windows/BalMasque.exe    final/BalMasque.exe
          cp release-assets/BalMasque-macOS/BalMasque-macOS    final/BalMasque-macOS
          chmod +x final/BalMasque-Linux final/BalMasque-macOS

      - name: Creer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1
          name: "Bal Masque v2.1 — Desktop"
          body: |
            ## 🎭 Bal Masqué v2.1 — Version Desktop

            Outil de floutage de visages et suppression de métadonnées.
            100 % hors-ligne, 100 % open-source.

            ---

            ### 📥 Téléchargement direct (sans zip)

            | Plateforme | Fichier | Instructions |
            |------------|---------|-------------|
            | 🐧 **Linux** | `BalMasque-Linux` | Télécharger → `chmod +x BalMasque-Linux` → `./BalMasque-Linux` |
            | 🪟 **Windows** | `BalMasque.exe` | Télécharger → Double-cliquer |
            | 🍎 **macOS** | `BalMasque-macOS` | Télécharger → `chmod +x BalMasque-macOS` → `./BalMasque-macOS` |

            > ⚠️ **macOS** : Au premier lancement, faites clic droit → Ouvrir (ou autorisez dans Préférences Système → Sécurité).

            ---

            ### ⚠️ Version Android

            La version Android (APK) n'est **pas encore disponible** dans cette release.
            Elle est en cours de développement.

            ---

            ### Fonctionnalités
            - Détection automatique des visages (3 classificateurs Haar)
            - 3 effets : pixelisation, flou gaussien, masque noir
            - Mode manuel pour zones personnalisées
            - Suppression complète des métadonnées (EXIF, GPS, XMP, ICC…)
            - Score de risque (0-100)
            - Export PNG / JPEG / WebP
          files: |
            final/BalMasque-Linux
            final/BalMasque.exe
            final/BalMasque-macOS
          draft: false
          prerelease: false
